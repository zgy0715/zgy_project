name: DeepAgent CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ========================
  # Vector Engine (C++)
  # ========================
  vector-engine-build:
    name: Vector Engine Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libpython3-dev pybind11
      - name: Configure CMake
        run: |
          cd vector-engine
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON
      - name: Build
        run: |
          cd vector-engine/build
          make -j$(nproc)
      - name: Test
        run: |
          cd vector-engine/build
          ctest --output-on-failure

  # ========================
  # Agent Runtime (Python)
  # ========================
  agent-runtime-test:
    name: Agent Runtime Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          cd agent-runtime
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov
      - name: Lint with ruff
        run: |
          cd agent-runtime
          ruff check app/
      - name: Type check with mypy
        run: |
          cd agent-runtime
          mypy app/ --ignore-missing-imports
      - name: Test with pytest
        run: |
          cd agent-runtime
          pytest tests/ -v --cov=app --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: agent-runtime/coverage.xml

  # ========================
  # API Gateway (Java)
  # ========================
  api-gateway-test:
    name: API Gateway Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - name: Build & Test with Maven
        run: |
          cd api-gateway
          ./mvnw verify -B
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: api-gateway/target/site/jacoco/jacoco.xml

  # ========================
  # Frontend (TypeScript)
  # ========================
  frontend-test:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Lint
        run: |
          cd frontend
          npm run lint
      - name: Build
        run: |
          cd frontend
          npm run build

  # ========================
  # Docker Build & Push
  # ========================
  docker-push:
    name: Build & Push Docker Images
    needs: [vector-engine-build, agent-runtime-test, api-gateway-test, frontend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [api-gateway, agent-runtime, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
