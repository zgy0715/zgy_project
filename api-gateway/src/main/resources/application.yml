server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: deepagent-api-gateway

  # Active profile (override with -Dspring.profiles.active=prod)
  profiles:
    active: dev

  # Jackson JSON configuration
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    date-format: yyyy-MM-dd'T'HH:mm:ss

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
        query:
          fail_on_pagination_over_collection_fetch: true

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10

  # Cache
  cache:
    type: redis
    redis:
      time-to-live: 1800000
      cache-null-values: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:change-this-secret-to-a-very-long-random-string-at-least-256-bits-for-hmac-sha256}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}

# gRPC Client Configuration
grpc:
  client:
    agent-service:
      host: ${GRPC_AGENT_HOST:localhost}
      port: ${GRPC_AGENT_PORT:50051}
      keep-alive-time: 30
      keep-alive-timeout: 10
      enable-keep-alive: true

# Python Agent Runtime Configuration
agent-runtime:
  url: ${AGENT_RUNTIME_URL:http://localhost:8000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.deepagent: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# Virtual threads
spring.threads:
  virtual:
    enabled: true
